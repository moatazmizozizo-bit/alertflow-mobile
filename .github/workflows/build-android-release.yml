name: Build Android Release APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: 17 }
      - name: Install dependencies
        run: npm ci
      - name: Prebuild (generate android project)
        run: npx expo prebuild --platform android --clean
      - name: Use debug signing for release build
        run: |
          sed -i 's|signingConfig signingConfigs.release|signingConfig signingConfigs.debug|' android/app/build.gradle
      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: alertflow-mobile-release-apk
          path: android/app/build/outputs/apk/release/*.apk
