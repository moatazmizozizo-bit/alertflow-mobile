name: Build Android APK
on:
  workflow_dispatch:
  push: { branches: [main] }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: 17 }
      - name: Install dependencies
        run: npm ci
      - name: Prebuild (generate android project)
        run: npx expo prebuild --clean
      - name: Bundle JS with Expo CLI
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed --platform android --entry-file index.ts --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res --dev false
      - name: Build debug APK (uses pre-generated JS bundle)
        run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: alertflow-mobile-apk
          path: android/app/build/outputs/apk/debug/*.apk
