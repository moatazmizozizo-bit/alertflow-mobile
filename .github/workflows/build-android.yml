name: Build Android APK
on:
  workflow_dispatch:
  push: { branches: [main] }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: 17 }
      - name: Install dependencies
        run: npm ci
      - name: Prebuild (generate android project + link native modules)
        run: npx expo prebuild --platform android --clean
      - name: Generate debug keystore (so the release APK is signed & installable)
        run: keytool -genkey -v -keystore android/app/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
      - name: Build release APK (Gradle bundles the JS via expo export:embed)
        run: cd android && ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: alertflow-mobile-apk
          path: android/app/build/outputs/apk/release/*.apk
